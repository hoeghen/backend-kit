name: CI & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test -- --coverage

  publish:
    name: Publish to GitHub Packages
    # Only runs on version tags (v1.2.3)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GitHub Packages

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # Point npm at the GitHub Packages registry for this scope
          registry-url: "https://npm.pkg.github.com"
          scope: "@hoeghen"   # must match the package name scope

      - run: npm ci
      - run: npm run build

      - run: npm publish
        env:
          # GitHub automatically provides this token with packages:write permission
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
